name: V75 M15 SMA Alerts (LIVE)

on:
  workflow_dispatch:
    inputs:
      source:
        description: "manual or cronjob"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: v75-m15-sma-alerts
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm ci || npm install

      - name: Run alerts (LIVE)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          MODE: live
          TRIGGER_SOURCE: ${{ github.event.inputs.source || 'manual' }}
        run: |
          echo "Triggered source: $TRIGGER_SOURCE"
          node alert.js

      - name: Save updated state.json (if changed)
        run: |
          if git diff --quiet; then
            echo "No state changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state.json
          git commit -m "Update state"

          git pull --rebase origin main
          git push origin HEAD:main
