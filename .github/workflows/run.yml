name: V75 M15 SMA Alerts

on:
  schedule:
    - cron: "1,16,31,46 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "live | backtest | test (scheduled runs are forced to live)"
        required: false
        default: "live"
      backtest_bars:
        description: "How many M15 candles to scan in backtest"
        required: false
        default: "300"

permissions:
  contents: write

concurrency:
  group: v75-m15-sma-alerts
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync main
        run: git pull --rebase origin main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm ci || npm install

      - name: Run alerts
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # Force LIVE on scheduled runs; allow manual mode selection
          MODE: ${{ github.event_name == 'schedule' && 'live' || github.event.inputs.mode || 'live' }}
          BACKTEST_BARS: ${{ github.event.inputs.backtest_bars || '300' }}
        run: node alert.js

      - name: Save updated state.json (if changed)
        run: |
          if git diff --quiet; then
            echo "No state changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state.json
          git commit -m "Update state"

          git pull --rebase origin main
          git push origin HEAD:main
