name: V75 M15 SMA Alerts

on:
  schedule:
    - cron: "1,16,31,46 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "live | test | backtest"
        required: false
        default: "test"
      backtest_bars:
        description: "How many M15 candles to scan in backtest"
        required: false
        default: "300"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Run alerts
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          MODE: ${{ github.event.inputs.mode }}
          BACKTEST_BARS: ${{ github.event.inputs.backtest_bars }}
        run: node alert.js

      - name: Save updated state.json (if changed)
        run: |
          if git diff --quiet; then
            echo "No state changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state"
            git push
          fi
